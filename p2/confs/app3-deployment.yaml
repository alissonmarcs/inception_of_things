apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3-deployment
  namespace: default
  labels:
    app: app3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: app3-container
        image: hashicorp/http-echo:latest
        args:
        - "-text=<html><body style='background-color: #fff7e6;'><h1>🚀 Bem-vindo ao App 3!</h1><p>Esta é a terceira aplicação exigida pelo PDF.</p></body></html>"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: app3-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: app3
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5678
