apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-deployment
  namespace: default
  labels:
    app: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1-container
        image: hashicorp/http-echo:latest
        args:
        - "-text=<html><body style='background-color: #e6f7ff;'><h1>👋 Olá do App 1!</h1><p>Esta é a aplicação única rodando no cluster.</p></body></html>"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: app1-service
  namespace: default
spec:
  type: ClusterIP 
  selector:
    app: app1
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5678
